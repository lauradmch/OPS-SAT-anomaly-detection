name: CI

on:
  push:
    branches: [main, "day*"]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.13.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-serve.txt
          pip install --no-deps .
          pip install ruff pytest
      - name: Lint
        run: ruff check api src/ops_sat_ad/serving tests
      - name: Test
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ops-sat-ad:ci .